# Secrets requis dans GitHub Settings → Secrets → Actions :
# HETZNER_HOST     — IP publique du VPS
# HETZNER_USER     — utilisateur SSH (ex: root)
# HETZNER_SSH_KEY  — clé privée SSH (contenu du fichier ~/.ssh/id_rsa)

name: CD

on:
  push:
    branches:
      - main

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.transport24h.fr
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          tags: |
            ghcr.io/${{ env.OWNER }}/t24h-web:latest
            ghcr.io/${{ env.OWNER }}/t24h-web:${{ github.sha }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            kubectl set image deployment/web web=ghcr.io/${{ env.OWNER }}/t24h-web:${{ github.sha }} -n transport24h
            kubectl rollout status deployment/web -n transport24h --timeout=120s
